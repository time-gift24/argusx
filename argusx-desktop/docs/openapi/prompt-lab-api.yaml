openapi: 3.0.3
info:
  title: PromptLab API
  version: 1.0.0
  description: |
    Prompt and SOP (Standard Operating Procedure) Management System

    ## Database Schema Overview

    | Table | Description |
    |-------|-------------|
    | `checklist_items` | Evaluation prompts/checks |
    | `check_results` | Evaluation results for SOPs/steps |
    | `golden_set_items` | Grouped checklist items for batch evaluation |
    | `ai_execution_logs` | LLM execution audit trail |
    | `sops` | Standard Operating Procedures |
    | `sop_steps` | Steps within SOPs |

    ## Entity Relationship Diagram

    ```
    ┌──────────────────┐       ┌──────────────────┐
    │  checklist_items │◄──────│   check_results  │
    │    (prompts)     │       │ (evaluation logs) │
    └────────┬─────────┘       └────────┬─────────┘
             │                            │
             │                            │
             ▼                            ▼
    ┌──────────────────┐       ┌──────────────────┐
    │golden_set_items  │       │ai_execution_logs│
    │ (grouped items)  │       │  (LLM audit)    │
    └────────┬─────────┘       └──────────────────┘
             │
             │
             ▼
    ┌──────────────────┐       ┌──────────────────┐
    │       sops       │◄──────│    sop_steps     │
    │ (procedures)     │       │   (steps)        │
    └──────────────────┘       └──────────────────┘
    ```

    ## API Modules

    - **Checklist**: Prompt/Check management (CRUD)
    - **Golden Set**: Batch evaluation grouping
    - **Check Result**: Evaluation results
    - **AI Execution Log**: LLM call auditing
    - **SOP**: Standard Operating Procedures
    - **SOP Step**: Procedure steps

servers:
  - url: http://localhost:1420
    description: Local development server
  - url: /api/v1
    description: Relative path (for Tauri IPC proxy)

tags:
  - name: checklist
    description: Checklist/Prompt management
  - name: golden-set
    description: Golden Set (grouped checklist items)
  - name: check-result
    description: Evaluation results
  - name: ai-log
    description: AI/LLM execution logs
  - name: sop
    description: Standard Operating Procedures
  - name: sop-step
    description: SOP Steps

# ============================================================
# COMPONENTS - Schemas
# ============================================================
components:

  schemas:

    # -------------------------------------------------------
    # Checklist Items (checklist_items table)
    # -------------------------------------------------------
    ChecklistItem:
      type: object
      description: |
        ## Database Table: `checklist_items`

        Evaluation prompt/check item. Used to validate SOPs or individual steps.

        | Column | Type | Description |
        |--------|------|-------------|
        | id | INTEGER | Primary key |
        | name | TEXT | Display name |
        | prompt | TEXT | Evaluation prompt |
        | target_level | TEXT | `step` or `sop` |
        | result_schema | TEXT | JSON schema for expected result |
        | version | INTEGER | Optimistic locking |
        | status | TEXT | `active`, `inactive`, `draft` |
        | created_at | TEXT | ISO8601 timestamp |
        | updated_at | TEXT | ISO8601 timestamp |
        | created_by | INTEGER | User ID |
        | updated_by | INTEGER | User ID |
        | deleted_at | TEXT | Soft delete timestamp |
      properties:
        id:
          type: integer
          description: Primary key
        name:
          type: string
          description: Display name
        prompt:
          type: string
          description: Evaluation prompt
        target_level:
          type: string
          enum: [step, sop]
          description: |
            - `step`: Validates individual SOP steps
            - `sop`: Validates entire SOPs
        result_schema:
          type: object
          nullable: true
          description: JSON schema for expected result
        version:
          type: integer
          description: Version number for optimistic locking
        status:
          type: string
          enum: [active, inactive, draft]
          description: |
            - `active`: Currently in use
            - `inactive`: Deprecated but visible
            - `draft`: Work in progress
        created_at:
          type: string
          format: date-time
          description: Creation timestamp (ISO8601)
        updated_at:
          type: string
          format: date-time
          description: Last update timestamp (ISO8601)
        created_by:
          type: integer
          nullable: true
          description: Creator user ID
        updated_by:
          type: integer
          nullable: true
          description: Last modifier user ID
        deleted_at:
          type: string
          format: date-time
          nullable: true
          description: Soft delete timestamp

    CreateChecklistItemInput:
      type: object
      required:
        - name
        - prompt
        - target_level
      properties:
        name:
          type: string
        prompt:
          type: string
        target_level:
          type: string
          enum: [step, sop]
        result_schema:
          type: object
        status:
          type: string
          enum: [active, inactive, draft]
          default: active

    UpdateChecklistItemInput:
      type: object
      properties:
        name:
          type: string
        prompt:
          type: string
        target_level:
          type: string
          enum: [step, sop]
        result_schema:
          type: object
        status:
          type: string
          enum: [active, inactive, draft]

    ChecklistFilter:
      type: object
      properties:
        status:
          type: string
          enum: [active, inactive, draft]
        target_level:
          type: string
          enum: [step, sop]

    # -------------------------------------------------------
    # Check Results (check_results table)
    # -------------------------------------------------------
    CheckResult:
      type: object
      description: |
        ## Database Table: `check_results`

        Evaluation result for an SOP or step against a checklist item.

        | Column | Type | Description |
        |--------|------|-------------|
        | id | INTEGER | Primary key |
        | context_type | TEXT | `sop` or `step` |
        | context_id | INTEGER | ID of evaluated SOP/step |
        | check_item_id | INTEGER | FK to checklist_items |
        | source_type | INTEGER | 1=AI, 2=Manual |
        | operator_id | TEXT | Operator identifier |
        | result | TEXT | JSON evaluation result |
        | is_pass | INTEGER | 0=failed, 1=passed |
        | created_at | TEXT | ISO8601 timestamp |
      properties:
        id:
          type: integer
        context_type:
          type: string
          enum: [sop, step]
        context_id:
          type: integer
          description: ID of the evaluated SOP or step
        check_item_id:
          type: integer
          description: FK to checklist_items.id
        source_type:
          type: integer
          enum: [1, 2]
          description: |
            - `1`: AI/automated evaluation
            - `2`: Manual/human evaluation
        operator_id:
          type: string
          nullable: true
        result:
          type: object
          nullable: true
          description: JSON evaluation result
        is_pass:
          type: integer
          enum: [0, 1]
          description: |
            - `0`: Failed
            - `1`: Passed
        created_at:
          type: string
          format: date-time

    UpsertCheckResultInput:
      type: object
      required:
        - context_type
        - context_id
        - check_item_id
        - source_type
        - is_pass
      properties:
        context_type:
          type: string
          enum: [sop, step]
        context_id:
          type: integer
        check_item_id:
          type: integer
        source_type:
          type: integer
          enum: [1, 2]
        operator_id:
          type: string
        result:
          type: object
        is_pass:
          type: integer
          enum: [0, 1]

    CheckResultFilter:
      type: object
      properties:
        context_type:
          type: string
          enum: [sop, step]
        context_id:
          type: integer
        check_item_id:
          type: integer
        is_pass:
          type: integer
          enum: [0, 1]

    # -------------------------------------------------------
    # Golden Set Items (golden_set_items table)
    # -------------------------------------------------------
    GoldenSetItem:
      type: object
      description: |
        ## Database Table: `golden_set_items`

        Links checklist items to a "golden set" (represented by check_results.id).
        Used for batch evaluation.

        | Column | Type | Description |
        |--------|------|-------------|
        | golden_set_id | INTEGER | FK to check_results.id (acts as set ID) |
        | checklist_item_id | INTEGER | FK to checklist_items.id |
        | sort_order | INTEGER | Display order |
        | created_at | TEXT | ISO8601 timestamp |

        **Note**: The "golden set" concept is stored via check_results.id.
        A golden set is actually a check_result entry that serves as a container.
      properties:
        golden_set_id:
          type: integer
          description: FK to check_results.id (acts as golden set ID)
        checklist_item_id:
          type: integer
          description: FK to checklist_items.id
        sort_order:
          type: integer
          description: Display order within the set
        created_at:
          type: string
          format: date-time

    BindGoldenSetItemInput:
      type: object
      required:
        - golden_set_id
        - checklist_item_id
        - sort_order
      properties:
        golden_set_id:
          type: integer
          description: Target golden set ID (check_results.id)
        checklist_item_id:
          type: integer
          description: Checklist item to add
        sort_order:
          type: integer
          description: Position in set

    UnbindGoldenSetItemInput:
      type: object
      required:
        - golden_set_id
        - checklist_item_id
      properties:
        golden_set_id:
          type: integer
        checklist_item_id:
          type: integer

    # -------------------------------------------------------
    # AI Execution Logs (ai_execution_logs table)
    # -------------------------------------------------------
    AiExecutionLog:
      type: object
      description: |
        ## Database Table: `ai_execution_logs`

        Complete audit trail of LLM executions.

        | Column | Type | Description |
        |--------|------|-------------|
        | id | INTEGER | Primary key |
        | check_result_id | INTEGER | FK to check_results.id |
        | context_type | TEXT | `sop` or `step` |
        | context_id | INTEGER | Evaluated entity ID |
        | check_item_id | INTEGER | FK to checklist_items.id |
        | model_provider | TEXT | LLM provider (e.g., openai, anthropic) |
        | model_version | TEXT | Model name/version |
        | temperature | REAL | LLM temperature setting |
        | prompt_snapshot | TEXT | Exact prompt sent to LLM |
        | raw_output | TEXT | Raw response from LLM |
        | input_tokens | INTEGER | Token count (input) |
        | output_tokens | INTEGER | Token count (output) |
        | exec_status | INTEGER | 0=pending,1=success,2=api_error,3=parse_failed |
        | error_message | TEXT | Error details if failed |
        | latency_ms | INTEGER | Execution time in milliseconds |
        | created_at | TEXT | ISO8601 timestamp |
      properties:
        id:
          type: integer
        check_result_id:
          type: integer
          nullable: true
          description: FK to check_results.id
        context_type:
          type: string
          enum: [sop, step]
        context_id:
          type: integer
        check_item_id:
          type: integer
          description: FK to checklist_items.id
        model_provider:
          type: string
          nullable: true
        model_version:
          type: string
        temperature:
          type: number
          format: double
        prompt_snapshot:
          type: string
          nullable: true
        raw_output:
          type: string
          nullable: true
        input_tokens:
          type: integer
        output_tokens:
          type: integer
        exec_status:
          type: integer
          enum: [0, 1, 2, 3]
          description: |
            - `0`: Pending
            - `1`: Success
            - `2`: API Error
            - `3`: Parse Failed
        error_message:
          type: string
          nullable: true
        latency_ms:
          type: integer
        created_at:
          type: string
          format: date-time

    AppendAiExecutionLogInput:
      type: object
      required:
        - context_type
        - context_id
        - check_item_id
        - model_version
        - exec_status
      properties:
        check_result_id:
          type: integer
        context_type:
          type: string
          enum: [sop, step]
        context_id:
          type: integer
        check_item_id:
          type: integer
        model_provider:
          type: string
        model_version:
          type: string
        temperature:
          type: number
          format: double
        prompt_snapshot:
          type: string
        raw_output:
          type: string
        input_tokens:
          type: integer
        output_tokens:
          type: integer
        exec_status:
          type: integer
          enum: [0, 1, 2, 3]
        error_message:
          type: string
        latency_ms:
          type: integer

    AiExecutionLogFilter:
      type: object
      properties:
        context_type:
          type: string
          enum: [sop, step]
        context_id:
          type: integer
        check_item_id:
          type: integer
        model_provider:
          type: string
        exec_status:
          type: integer
          enum: [0, 1, 2, 3]

    # -------------------------------------------------------
    # SOPs (sops table)
    # -------------------------------------------------------
    Sop:
      type: object
      description: |
        ## Database Table: `sops`

        Standard Operating Procedure.

        | Column | Type | Description |
        |--------|------|-------------|
        | id | INTEGER | Primary key |
        | sop_id | TEXT | Unique identifier (e.g., "SOP-001") |
        | name | TEXT | Display name |
        | ticket_id | TEXT | Optional ticket reference |
        | version | INTEGER | Optimistic locking |
        | detect | TEXT | JSON - conditions that trigger this SOP |
        | handle | TEXT | JSON - how to handle |
        | verification | TEXT | JSON - how to verify success |
        | rollback | TEXT | JSON - rollback procedures |
        | status | TEXT | `active`, `inactive`, `draft` |
        | created_at | TEXT | ISO8601 timestamp |
        | updated_at | TEXT | ISO8601 timestamp |
      properties:
        id:
          type: integer
        sop_id:
          type: string
          description: Unique SOP identifier (e.g., "SOP-001")
        name:
          type: string
        ticket_id:
          type: string
          nullable: true
        version:
          type: integer
        detect:
          type: object
          nullable: true
          description: Conditions that trigger this SOP
        handle:
          type: object
          nullable: true
          description: How to handle the situation
        verification:
          type: object
          nullable: true
          description: How to verify success
        rollback:
          type: object
          nullable: true
          description: Rollback procedures
        status:
          type: string
          enum: [active, inactive, draft]
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreateSopInput:
      type: object
      required:
        - sop_id
        - name
      properties:
        sop_id:
          type: string
          description: Unique identifier (e.g., "SOP-001")
        name:
          type: string
        ticket_id:
          type: string
        detect:
          type: object
        handle:
          type: object
        verification:
          type: object
        rollback:
          type: object
        status:
          type: string
          enum: [active, inactive, draft]
          default: active

    UpdateSopInput:
      type: object
      properties:
        name:
          type: string
        ticket_id:
          type: string
        detect:
          type: object
        handle:
          type: object
        verification:
          type: object
        rollback:
          type: object
        status:
          type: string
          enum: [active, inactive, draft]

    SopFilter:
      type: object
      properties:
        status:
          type: string
          enum: [active, inactive, draft]
        ticket_id:
          type: string

    # -------------------------------------------------------
    # SOP Steps (sop_steps table)
    # -------------------------------------------------------
    SopStep:
      type: object
      description: |
        ## Database Table: `sop_steps`

        Individual steps within an SOP.

        | Column | Type | Description |
        |--------|------|-------------|
        | id | INTEGER | Primary key |
        | sop_id | TEXT | FK to sops.sop_id |
        | name | TEXT | Step name |
        | version | INTEGER | Optimistic locking |
        | operation | TEXT | JSON - what action to perform |
        | verification | TEXT | JSON - how to verify |
        | impact_analysis | TEXT | JSON - risk assessment |
        | rollback | TEXT | JSON - undo procedure |
        | created_at | TEXT | ISO8601 timestamp |
        | updated_at | TEXT | ISO8601 timestamp |
      properties:
        id:
          type: integer
        sop_id:
          type: string
          description: FK to sops.sop_id
        name:
          type: string
        version:
          type: integer
        operation:
          type: object
          nullable: true
          description: What action to perform
        verification:
          type: object
          nullable: true
          description: How to verify step success
        impact_analysis:
          type: object
          nullable: true
          description: Risk assessment
        rollback:
          type: object
          nullable: true
          description: Undo procedure
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreateSopStepInput:
      type: object
      required:
        - sop_id
        - name
      properties:
        sop_id:
          type: string
        name:
          type: string
        operation:
          type: object
        verification:
          type: object
        impact_analysis:
          type: object
        rollback:
          type: object

    UpdateSopStepInput:
      type: object
      properties:
        name:
          type: string
        operation:
          type: object
        verification:
          type: object
        impact_analysis:
          type: object
        rollback:
          type: object

    SopStepFilter:
      type: object
      properties:
        sop_id:
          type: string

    # -------------------------------------------------------
    # Common
    # -------------------------------------------------------
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string

  # ============================================================
  # COMPONENTS - Parameters
  # ============================================================
  parameters:
    FilterStatus:
      name: status
      in: query
      schema:
        type: string
        enum: [active, inactive, draft]
      description: Filter by status
    FilterTargetLevel:
      name: target_level
      in: query
      schema:
        type: string
        enum: [step, sop]
      description: Filter by target level
    FilterContextType:
      name: context_type
      in: query
      schema:
        type: string
        enum: [sop, step]
      description: Filter by context type
    FilterContextId:
      name: context_id
      in: query
      schema:
        type: integer
      description: Filter by context ID
    FilterCheckItemId:
      name: check_item_id
      in: query
      schema:
        type: integer
      description: Filter by checklist item ID
    FilterIsPass:
      name: is_pass
      in: query
      schema:
        type: integer
        enum: [0, 1]
      description: Filter by pass/fail
    FilterSopId:
      name: sop_id
      in: query
      schema:
        type: string
      description: Filter by SOP ID
    FilterTicketId:
      name: ticket_id
      in: query
      schema:
        type: string
      description: Filter by ticket ID

  # ============================================================
  # COMPONENTS - Responses
  # ============================================================
  responses:
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    InternalServerError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

# ============================================================
# PATHS - Checklist Items
# ============================================================
paths:
  /checklist-items:
    get:
      summary: List checklist items
      description: Get all checklist items with optional filters
      tags: [checklist]
      parameters:
        - $ref: '#/components/parameters/FilterStatus'
        - $ref: '#/components/parameters/FilterTargetLevel'
      responses:
        '200':
          description: List of checklist items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ChecklistItem'
        '400':
          $ref: '#/components/responses/BadRequest'

    post:
      summary: Create checklist item
      tags: [checklist]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateChecklistItemInput'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChecklistItem'
        '400':
          $ref: '#/components/responses/BadRequest'

  /checklist-items/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer

    get:
      summary: Get checklist item by ID
      tags: [checklist]
      responses:
        '200':
          description: Checklist item
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChecklistItem'
        '404':
          $ref: '#/components/responses/NotFound'

    patch:
      summary: Update checklist item
      tags: [checklist]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateChecklistItemInput'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChecklistItem'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      summary: Delete checklist item (soft delete)
      tags: [checklist]
      responses:
        '204':
          description: Deleted
        '404':
          $ref: '#/components/responses/NotFound'

# ============================================================
# PATHS - Golden Set Items
# ============================================================
  /golden-sets/items:
    get:
      summary: List golden set items
      description: |
        List items in a golden set.

        **Database relationship**:
        - `golden_set_items.golden_set_id` = `check_results.id`
        - `golden_set_items.checklist_item_id` = `checklist_items.id`
      tags: [golden-set]
      parameters:
        - name: golden_set_id
          in: query
          required: true
          schema:
            type: integer
          description: Golden set ID (check_results.id)
      responses:
        '200':
          description: List of golden set items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/GoldenSetItem'

    post:
      summary: Bind checklist item to golden set
      description: |
        Add a checklist item to a golden set.

        **Database relationship**:
        - Creates entry in `golden_set_items` table
      tags: [golden-set]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BindGoldenSetItemInput'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GoldenSetItem'
        '400':
          $ref: '#/components/responses/BadRequest'

    delete:
      summary: Unbind checklist item from golden set
      description: |
        Remove a checklist item from a golden set.

        **Database relationship**:
        - Deletes from `golden_set_items` table
      tags: [golden-set]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UnbindGoldenSetItemInput'
      responses:
        '204':
          description: Deleted

# ============================================================
# PATHS - Check Results
# ============================================================
  /check-results:
    get:
      summary: List check results
      description: |
        Get evaluation results.

        **Database relationships**:
        - `check_results.check_item_id` → `checklist_items.id`
        - `golden_set_items.golden_set_id` = `check_results.id` (for golden sets)
      tags: [check-result]
      parameters:
        - $ref: '#/components/parameters/FilterContextType'
        - $ref: '#/components/parameters/FilterContextId'
        - $ref: '#/components/parameters/FilterCheckItemId'
        - $ref: '#/components/parameters/FilterIsPass'
      responses:
        '200':
          description: List of check results
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CheckResult'

    post:
      summary: Upsert check result
      description: |
        Create or update evaluation result.

        **Database table**: `check_results`
      tags: [check-result]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpsertCheckResultInput'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CheckResult'
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CheckResult'

# ============================================================
# PATHS - AI Execution Logs
# ============================================================
  /ai-logs:
    get:
      summary: List AI execution logs
      description: |
        Get LLM execution audit logs.

        **Database relationships**:
        - `ai_execution_logs.check_result_id` → `check_results.id`
        - `ai_execution_logs.check_item_id` → `checklist_items.id`
      tags: [ai-log]
      parameters:
        - $ref: '#/components/parameters/FilterContextType'
        - $ref: '#/components/parameters/FilterContextId'
        - $ref: '#/components/parameters/FilterCheckItemId'
        - name: model_provider
          in: query
          schema:
            type: string
        - name: exec_status
          in: query
          schema:
            type: integer
            enum: [0, 1, 2, 3]
      responses:
        '200':
          description: List of AI execution logs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AiExecutionLog'

    post:
      summary: Append AI execution log
      description: |
        Record a new LLM execution.

        **Database table**: `ai_execution_logs`
      tags: [ai-log]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AppendAiExecutionLogInput'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AiExecutionLog'

